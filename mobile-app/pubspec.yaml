name: docduty
version: 1.0.0+1
publish_to: none
description: "DocDuty — Healthcare Staffing Marketplace for Pakistan"
environment: 
  sdk: '>=3.4.1 <4.0.0'

dependencies: 
  cupertino_icons: ^1.0.6
  get: 4.6.6
  flutter: 
    sdk: flutter
  smooth_page_indicator: ^1.1.0
  flutter_otp_text_field: ^1.1.3+2
  image_picker: ^1.1.2
  intl_phone_field: ^3.2.0
  flutter_svg: ^2.0.10+1
  smooth_star_rating_null_safety: ^1.0.4+2
  provider: ^6.1.2
  google_maps_flutter: ^2.7.0
  syncfusion_flutter_sliders: ^26.1.39
  chat_bubbles: ^1.6.0
  url_launcher: ^6.3.0
  lottie: ^3.1.2
  photo_view: ^0.15.0
  share_plus: ^10.0.3
  # --- DocDuty production dependencies ---
  dio: ^5.4.0
  flutter_secure_storage: ^9.2.2
  geolocator: ^12.0.0
  mobile_scanner: ^5.1.1
  permission_handler: ^11.3.1
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  timeago: ^3.6.1
  fl_chart: ^0.68.0
  pull_to_refresh_flutter3: ^2.0.2

dev_dependencies: 
  flutter_lints: ^3.0.0
  flutter_test: 
    sdk: flutter

flutter: 
  uses-material-design: true

  assets:
    - assets/images/
  
  fonts:
    - family: Gilroy
      fonts:
        - asset: assets/fonts/Gilroy-Regular.otf
