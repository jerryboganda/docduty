allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

// Provide Flutter build properties to plugin subprojects that reference
// flutter.compileSdkVersion / flutter.minSdkVersion (e.g. geolocator_android).
subprojects { sub ->
    if (sub.name != "app") {
        sub.ext.set("flutter", [
            compileSdkVersion: 35,
            minSdkVersion    : 21,
            targetSdkVersion : 35,
            ndkVersion       : "25.1.8937393"
        ])
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
