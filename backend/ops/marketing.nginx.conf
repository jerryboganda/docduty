server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Asset requests must 404 when the exact file is missing so stale PWA caches
  # do not receive index.html as JavaScript.
  location /assets/ {
    try_files $uri =404;
  }

  location = /manifest.webmanifest {
    try_files $uri =404;
  }

  location = /registerSW.js {
    try_files $uri =404;
    add_header Cache-Control "no-cache";
  }

  location = /sw.js {
    try_files $uri =404;
    add_header Cache-Control "no-cache";
  }

  location ^~ /mobile/ {
    try_files $uri $uri/ /mobile/index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
